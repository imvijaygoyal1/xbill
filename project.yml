name: xBill
options:
  bundleIdPrefix: com.vijaygoyal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  configFiles:
    debug: Secrets.xcconfig
    release: Secrets.xcconfig
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"        # iPhone only
    SUPPORTS_MAC_DESIGNED_FOR_IPAD: NO
    SWIFT_EMIT_LOC_STRINGS: YES
    GCC_GENERATE_DEBUGGING_SYMBOLS: YES

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    exactVersion: 2.43.1

targets:
  xBill:
    type: application
    platform: iOS
    sources:
      - path: xBill
        excludes:
          - "**/.DS_Store"
    resources:
      - path: xBill
        includes:
          - "**/*.xcassets"
          - "**/*.storyboard"
          - "**/*.xib"
          - "**/*.plist"
          - "**/*.xcprivacy"
    dependencies:
      - package: Supabase
        product: Supabase
      - target: xBillWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaygoyal.xbill
        INFOPLIST_FILE: xBill/Info.plist
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          CODE_SIGN_ENTITLEMENTS: xBill/xBill.Debug.entitlements
          DEBUG_INFORMATION_FORMAT: dwarf
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES
          CODE_SIGN_ENTITLEMENTS: xBill/xBill.entitlements
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

  xBillWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: xBillWidget
        excludes:
          - "**/.DS_Store"
          - "**/*.plist"
          - "**/*.entitlements"
    resources:
      - path: xBillWidget
        includes:
          - "**/*.plist"
          - "**/*.xcprivacy"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaygoyal.xbill.widget
        INFOPLIST_FILE: xBillWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        ENABLE_STRICT_CONCURRENCY: complete
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: xBillWidget/xBillWidget.entitlements
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  xBillTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: xBillTests
    dependencies:
      - target: xBill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaygoyal.xbill.tests
        GENERATE_INFOPLIST_FILE: YES

  xBillUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: xBillUITests
    dependencies:
      - target: xBill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaygoyal.xbill.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  xBill:
    build:
      targets:
        xBill: all
        xBillWidget: all
        xBillTests: [test]
        xBillUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: xBillTests
          parallelizable: true
          randomExecutionOrder: true
        - name: xBillUITests
    profile:
      config: Release
    archive:
      config: Release
