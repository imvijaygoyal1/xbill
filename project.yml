name: xBill
options:
  bundleIdPrefix: com.vijaygoyal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"        # iPhone only
    SUPPORTS_MAC_DESIGNED_FOR_IPAD: NO
    SWIFT_EMIT_LOC_STRINGS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SUPABASE_URL: "https://rhdhazevigbchmwzesok.supabase.co"
    SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoZGhhemV2aWdiY2htd3plc29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NzI0MjgsImV4cCI6MjA5MTI0ODQyOH0.oQYwbO2Fz5ZwqF6TPr1YMnpM5n3kb1GEpZY9Ja3RUtM"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    exactVersion: 2.43.1

targets:
  xBill:
    type: application
    platform: iOS
    entitlements:
      path: xBill/xBill.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    sources:
      - path: xBill
        excludes:
          - "**/.DS_Store"
    resources:
      - path: xBill
        includes:
          - "**/*.xcassets"
          - "**/*.storyboard"
          - "**/*.xib"
          - "**/*.plist"
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaygoyal.xbill
        INFOPLIST_FILE: xBill/Info.plist
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES

  xBillTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: xBillTests
    dependencies:
      - target: xBill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaygoyal.xbill.tests
        GENERATE_INFOPLIST_FILE: YES

  xBillUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: xBillUITests
    dependencies:
      - target: xBill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vijaygoyal.xbill.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  xBill:
    build:
      targets:
        xBill: all
        xBillTests: [test]
        xBillUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: xBillTests
          parallelizable: true
          randomExecutionOrder: true
        - name: xBillUITests
    profile:
      config: Release
    archive:
      config: Release
