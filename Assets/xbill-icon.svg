<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background squircle -->
  <rect width="1024" height="1024" rx="226" ry="226" fill="#3C3489"/>

  <!-- Receipt shadow (offset duplicate for depth) -->
  <rect x="327" y="197" width="380" height="480" rx="22" ry="22" fill="#000000" opacity="0.05"/>

  <!-- Receipt body -->
  <rect x="322" y="192" width="380" height="480" rx="22" ry="22" fill="#FFFFFF"/>

  <!-- Title bar row -->
  <rect x="361" y="232" width="200" height="20" rx="10" ry="10" fill="#AFA9EC"/>

  <!-- Content rows -->
  <rect x="361" y="278" width="170" height="16" rx="8" ry="8" fill="#CECBF6"/>
  <rect x="361" y="312" width="190" height="16" rx="8" ry="8" fill="#CECBF6"/>
  <rect x="361" y="346" width="150" height="16" rx="8" ry="8" fill="#CECBF6"/>

  <!-- Dashed divider line at ~60% down the receipt (192 + 480*0.6 = 480) -->
  <line x1="342" y1="480" x2="682" y2="480" stroke="#AFA9EC" stroke-width="6" stroke-dasharray="20 12" stroke-linecap="round"/>

  <!-- Downward chevron (V shape) between divider and amount pills -->
  <polyline points="492,504 512,528 532,504" fill="none" stroke="#7F77DD" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Two amount pill shapes below divider -->
  <rect x="362" y="548" width="100" height="18" rx="9" ry="9" fill="#7F77DD"/>
  <rect x="562" y="548" width="100" height="18" rx="9" ry="9" fill="#7F77DD"/>

  <!-- Avatar circles overlapping the bottom edge of the receipt (receipt bottom = 192+480 = 672) -->
  <!-- Avatar 1: "AL" — left -->
  <circle cx="392" cy="672" r="40" fill="#EEEDFE" stroke="#FFFFFF" stroke-width="3"/>
  <text x="392" y="681" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="28" font-weight="700" fill="#3C3489">AL</text>

  <!-- Avatar 2: "MR" — center -->
  <circle cx="512" cy="672" r="40" fill="#EEEDFE" stroke="#FFFFFF" stroke-width="3"/>
  <text x="512" y="681" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="28" font-weight="700" fill="#3C3489">MR</text>

  <!-- Avatar 3: "JT" — right -->
  <circle cx="632" cy="672" r="40" fill="#EEEDFE" stroke="#FFFFFF" stroke-width="3"/>
  <text x="632" y="681" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="28" font-weight="700" fill="#3C3489">JT</text>
</svg>
