name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      EXPECTED_PROJECT_REF: rhdhazevigbchmwzesok
    steps:
      - name: Validate Supabase target
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "SUPABASE_URL secret is missing."
            exit 1
          fi

          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "SUPABASE_ANON_KEY secret is missing."
            exit 1
          fi

          host="$(node -e "console.log(new URL(process.env.SUPABASE_URL).hostname)")"
          echo "Supabase host: ${host}"

          expected_host="${EXPECTED_PROJECT_REF}.supabase.co"
          if [ "${host}" != "${expected_host}" ]; then
            echo "SUPABASE_URL points to ${host}, expected ${expected_host}."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Ping Supabase REST API
        run: |
          set -euo pipefail

          now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          curl --fail --silent --show-error \
            -X PATCH \
            "${SUPABASE_URL}/rest/v1/keep_alive?id=eq.1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            --data "{\"updated_at\":\"${now}\"}"

          response="$(
            curl --fail --silent --show-error \
              "${SUPABASE_URL}/rest/v1/keep_alive?select=id,updated_at&id=eq.1" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"
          )"

          echo "Keep-alive response: ${response}"

          updated_at="$(RESPONSE="${response}" node -e "const rows = JSON.parse(process.env.RESPONSE); console.log(rows?.[0]?.updated_at || '')" )"
          if [ -z "${updated_at}" ]; then
            echo "Could not read back keep_alive.updated_at."
            exit 1
          fi

          echo "keep_alive.updated_at=${updated_at}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
